        post:
            summary: Add a tag or collection to a content item
            operationId: addTagOrCollection
            description: Associates an existing tag or collection with a content item. Can also create a new tag/collection if CREATE_NEW is true. The TYPE parameter determines whether a tag or collection is being added. The endpoint varies by API type (admin vs portal).
            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                type:
                                    type: string
                                    description: 'The type of metadata: "tag" or "collection"'
                                contentId:
                                    type: string
                                    description: The ID of the content item
                                contentDefinition:
                                    type: object
                                    description: The content definition object with id and description
                                tagName:
                                    type: string
                                    description: The name of the tag or collection
                                tagId:
                                    type: string
                                    description: The ID of an existing tag or collection (null if creating new)
                                createNew:
                                    type: boolean
                                    description: 'Whether to create a new tag/collection if it doesn''t exist'
                            required:
                                - type
                                - contentId
                                - contentDefinition
                                - tagName
                                - tagId
                                - createNew
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

