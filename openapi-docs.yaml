    /registerAsset:
        post:
            summary: Register an existing storage object as a managed asset
            operationId: registerAsset
            description: Creates a new asset record for an object that already exists in cloud storage (e.g., S3). This allows external files to be managed within the Nomad platform without re-uploading. Optionally triggers media processing on the registered asset.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The ID to assign to the asset
                                parentId:
                                    type: string
                                    description: The ID of the parent folder
                                displayObjectKey:
                                    type: string
                                    description: The display-friendly object key
                                bucketName:
                                    type: string
                                    description: The S3 bucket name containing the object
                                objectKey:
                                    type: string
                                    description: The S3 object key path
                                eTag:
                                    type: string
                                tags:
                                    type: array
                                    items:
                                        type: string
                                    description: Tags to assign to the asset
                                collections:
                                    type: array
                                    items:
                                        type: string
                                    description: Collections to add the asset to
                                relatedContents:
                                    type: array
                                    items:
                                        type: string
                                    description: Related content references
                                sequencer:
                                    type: string
                                    description: The storage event sequencer value
                                assetStatus:
                                    type: string
                                    description: Initial asset status (e.g., Available, Archived)
                                storageClass:
                                    type: string
                                    description: Storage class (e.g., Standard, Glacier)
                                assetType:
                                    type: string
                                    description: Asset type (Folder, File, or Bucket)
                                contentLength:
                                    type: integer
                                    description: File size in bytes
                                storageEventName:
                                    type: string
                                    description: Name of the triggering storage event
                                createdDate:
                                    type: string
                                    description: Asset creation date
                                storageSourceIpAddress:
                                    type: string
                                    description: Source IP of the storage event
                                startMediaProcessor:
                                    type: boolean
                                    description: Whether to start media processing
                                deleteMissingAsset:
                                    type: boolean
                                    description: Whether to delete asset records for missing storage objects
                            required:
                                - assetId
                                - parentId
                                - displayObjectKey
                                - bucketName
                                - objectKey
                                - eTag
                                - tags
                                - collections
                                - relatedContents
                                - sequencer
                                - assetStatus
                                - storageClass
                                - assetType
                                - contentLength
                                - storageEventName
                                - createdDate
                                - storageSourceIpAddress
                                - startMediaProcessor
                                - deleteMissingAsset
            responses:
                '200':
                    description: Success
                '400':
