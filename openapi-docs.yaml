openapi: 3.0.0
info:
    title: Nomad Client SDK
    version: 2026-03
servers:
    - url: serviceApiUrl

paths:

    # ── Authentication ──
    /login:
        post:
            summary: Authenticate a user and obtain a JWT access token
            operationId: login
            description: 'Validates the user''s credentials and, if successful, creates a new session and returns a JWT access token with a refresh token. Accounts that are disabled, expired, pending invitation, or pending approval will be rejected. Guest users must have a valid profile and permitted application access.'
            tags:
                - Authentication
            responses:
                '200':
                    description: Success
                '400':
                    description: The request body is null or missing required fields (UserName, Password)
                '403':
                    description: User account is Disabled, Expired, PendingInvitation, or PendingApproval
                '404':
                    description: Authentication failed — invalid credentials or user not found

    /logout:
        post:
            summary: Log out the currently authenticated user and end their session
            operationId: logout
            description: 'Ends the user''s active session and invalidates the authentication token. If a UserSessionId is provided, that specific session is terminated.'
            tags:
                - Authentication
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /refreshToken:
        post:
            summary: Retrieve a new JWT access token using a refresh token
            operationId: refreshToken
            description: 'Exchanges a valid refresh token for a new JWT access token. Automatically updates the SDK instance''s token property on success.'
            tags:
                - Authentication
            responses:
                '200':
                    description: Success
                '400':
                    description: The request body is null or RefreshToken is missing
                '404':
                    description: The refresh token is invalid or has expired

    /forgotPassword:
        post:
            summary: 'Trigger a password reset code to be sent to the user''s email address'
            operationId: forgotPassword
            description: 'Initiates the password reset flow for the specified user account. If the account is active, a 6-digit verification code is sent to the user''s email address. The code should then be submitted to the reset-password endpoint along with the new password.'
            tags:
                - Authentication
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null or UserName is missing

    /resetPassword:
        post:
            summary: 'Reset the user''s password using a verification code from the forgot-password email'
            operationId: resetPassword
            description: Completes the password reset flow by validating the verification code from the forgot-password email and setting the new password. For accounts pending approval, this also completes the email verification step.
            tags:
                - Authentication
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                code:
                                    type: string
                                    description: The 6-digit verification code from the forgot-password email
                                newPassword:
                                    type: string
                                    description: The new password to set for the user
                            required:
                                - code
                                - newPassword
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null, UserName is missing, reset token is invalid/expired, or user is disabled


    # ── Registration ──
    /register:
        post:
            summary: Register a new user account with a unique email address
            operationId: register
            description: Creates a new user account with the specified email, name, and password. The email must be unique. Depending on the tenant configuration, the account may be auto-approved (Normal status) or require admin approval (PendingApproval status). A verification email is sent to the user.
            tags:
                - Registration
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                    description: The email address for the new account (must be unique)
                                firstName:
                                    type: string
                                    description: 'The user''s first name'
                                lastName:
                                    type: string
                                    description: 'The user''s last name'
                                password:
                                    type: string
                                    description: The password for the new account
                            required:
                                - email
                                - firstName
                                - lastName
                                - password
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null, Email is empty, or a user with this email already exists

    /resendCode:
        post:
            summary: Re-send the email verification confirmation code to the user
            operationId: resendCode
            description: 'Re-sends the email verification confirmation code to the specified user''s email address. Use this when the original verification email was not received or the code has expired.'
            tags:
                - Registration
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                    description: The email address (username) of the user to resend the code to
                            required:
                                - email
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null or UserName is missing

    /verify:
        post:
            summary: 'Verify a user''s email address using a confirmation code'
            operationId: verify
            description: 'Confirms the user''s email address using the verification code sent during registration. If the account requires admin approval, the response LoginStatus will be IsDisabled to indicate the account is verified but not yet approved for use.'
            tags:
                - Registration
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                    description: The email address (username) of the user to verify
                                code:
                                    type: string
                                    description: The verification code from the registration email
                            required:
                                - email
                                - code
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null, UserName is missing, or verification token is invalid/expired


    # ── Asset ──
    /archiveAsset:
        post:
            summary: Archive an asset to long-term storage
            operationId: archiveAsset
            description: 'Moves the specified asset to archival storage (e.g., AWS Glacier). The asset''s status changes to Archived and it becomes unavailable for streaming or download until restored.'
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset to archive
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /buildMedia:
        post:
            summary: Render a media builder composition into a final output file
            operationId: buildMedia
            description: Combines multiple media source segments into a single rendered output asset. The composition is built from the provided sources array and saved to the specified destination folder.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                sources:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/MediaSource'
                                    description: Array of source segments for the composition
                                title:
                                    type: string
                                    description: Display name for the rendered output asset
                                tags:
                                    type: array
                                    items:
                                        type: string
                                    description: Tags to assign to the output asset
                                collections:
                                    type: array
                                    items:
                                        type: string
                                    description: Collections to add the output to
                                relatedContents:
                                    type: array
                                    items:
                                        type: string
                                    description: Related content references
                                destinationFolderId:
                                    type: string
                                    description: Folder ID for the output asset
                                videoBitrate:
                                    type: integer
                                    description: Target video bitrate for the output
                                audioTracks:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/AudioTrack'
                                    description: Audio track configuration for the output
                            required:
                                - sources
                                - title
                                - tags
                                - collections
                                - relatedContents
                                - destinationFolderId
                                - videoBitrate
                                - audioTracks
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /clipAsset:
        post:
            summary: Create a clip (sub-segment) from a video asset
            operationId: clipAsset
            description: Extracts a portion of a video asset between the specified start and end timecodes, creating a new independent asset. The clip is placed in the specified output folder. Supports both Admin and Portal API types.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the source video asset
                                startTimeCode:
                                    type: string
                                    description: 'The start timecode for the clip (e.g., "00:01:30:00")'
                                endTimeCode:
                                    type: string
                                    description: 'The end timecode for the clip (e.g., "00:05:00:00")'
                                title:
                                    type: string
                                    description: The display name for the new clip asset
                                outputFolderId:
                                    type: string
                                    description: The folder ID where the clip will be saved
                                tags:
                                    type: array
                                    items:
                                        type: string
                                    description: Tags to assign to the clip
                                collections:
                                    type: array
                                    items:
                                        type: string
                                    description: Collections to add the clip to
                                relatedContents:
                                    type: array
                                    items:
                                        type: string
                                    description: Related content references
                                videoBitrate:
                                    type: integer
                                    description: Target video bitrate for the clip
                                audioTracks:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/AudioTrack'
                                    description: Audio track configuration for the clip
                            required:
                                - assetId
                                - startTimeCode
                                - endTimeCode
                                - title
                                - outputFolderId
                                - tags
                                - collections
                                - relatedContents
                                - videoBitrate
                                - audioTracks
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The source asset was not found

    /copyAsset:
        post:
            summary: Copy one or more assets to a different folder location
            operationId: copyAsset
            description: Creates copies of the specified assets in the destination folder. The original assets remain unchanged. Supports batch operations with optional content definition and schema settings.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetIds:
                                    type: array
                                    items:
                                        type: string
                                    description: The IDs of the assets to copy
                                destinationFolderId:
                                    type: string
                                    description: The ID of the destination folder
                                batchAction:
                                    type: object
                                    description: The batch action configuration for the copy operation
                                contentDefinitionId:
                                    type: string
                                    description: The content definition ID for the assets
                                schemaName:
                                    type: string
                                    description: The schema name for the assets
                                resolverExempt:
                                    type: string
                            required:
                                - assetIds
                                - destinationFolderId
                                - batchAction
                                - contentDefinitionId
                                - schemaName
                                - resolverExempt
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset or destination folder was not found

    /createAnnotation:
        post:
            summary: Create a new annotation on an asset
            operationId: createAnnotation
            description: Adds a time-based annotation to a video asset at the specified timecode range. Annotations can include a title, summary, and description.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                                startTimeCode:
                                    type: string
                                    description: The start timecode for the annotation
                                endTimeCode:
                                    type: string
                                    description: The end timecode for the annotation
                                title:
                                    type: string
                                    description: Title of the annotation
                                summary:
                                    type: string
                                    description: Brief summary of the annotation
                                description:
                                    type: string
                                    description: Detailed description of the annotation
                            required:
                                - assetId
                                - startTimeCode
                                - endTimeCode
                                - title
                                - summary
                                - description
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /createAssetAdBreak:
        post:
            summary: Create a new ad break cue point for an asset
            operationId: createAssetAdBreak
            description: Adds an ad break marker at the specified timecode in the video asset. Ad breaks are used to define insertion points for advertisements during playback.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                                timeCode:
                                    type: string
                                    description: The timecode for the ad break insertion point
                                tags:
                                    type: array
                                    items:
                                        type: string
                                    description: Tags to associate with the ad break
                                labels:
                                    type: array
                                    items:
                                        type: string
                                    description: Labels to associate with the ad break
                            required:
                                - assetId
                                - timeCode
                                - tags
                                - labels
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /createFolderAsset:
        post:
            summary: Create a new folder asset under the specified parent folder
            operationId: createFolderAsset
            description: Creates a new folder in the asset tree hierarchy under the given parent folder. The folder name can contain spaces and special characters.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                parentId:
                                    type: string
                                    description: The unique identifier of the parent folder
                                displayName:
                                    type: string
                                    description: The visual name of the new folder
                            required:
                                - parentId
                                - displayName
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The parent folder was not found

    /createPlaceholderAsset:
        post:
            summary: Create a placeholder asset under the specified parent folder
            operationId: createPlaceholderAsset
            description: Creates a new placeholder asset in the asset tree hierarchy. The placeholder name must include a file extension and can contain spaces and special characters.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                parentId:
                                    type: string
                                    description: The unique identifier of the parent folder
                                assetName:
                                    type: string
                                    description: The name of the placeholder asset (must contain file extension)
                            required:
                                - parentId
                                - assetName
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The parent folder was not found

    /createScreenshotAtTimecode:
        post:
            summary: Capture a screenshot from a video asset at a specific timecode
            operationId: createScreenshotAtTimecode
            description: Extracts a still image frame from the video at the specified timecode and saves it as a related screenshot asset.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the video asset
                                timeCode:
                                    type: string
                            required:
                                - assetId
                                - timeCode
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /deleteAnnotation:
        delete:
            summary: Delete an annotation from an asset
            operationId: deleteAnnotation
            description: Permanently removes the specified annotation from the asset.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                                annotationId:
                                    type: string
                                    description: The unique identifier of the annotation to delete
                            required:
                                - assetId
                                - annotationId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset or annotation was not found

    /deleteAsset:
        delete:
            summary: Delete an asset by its unique identifier
            operationId: deleteAsset
            description: Permanently removes the specified asset and its associated storage objects. This operation cannot be undone. If the asset is a folder, all child assets may also be affected.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset to delete
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /deleteAssetAdBreak:
        delete:
            summary: Delete an ad break from an asset
            operationId: deleteAssetAdBreak
            description: Removes the specified ad break cue point from the asset.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                                adBreakId:
                                    type: string
                                    description: The unique identifier of the ad break to delete
                            required:
                                - assetId
                                - adBreakId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset or ad break was not found

    /downloadArchiveAsset:
        post:
            summary: Create a downloadable ZIP archive containing multiple assets
            operationId: downloadArchiveAsset
            description: Packages the specified assets into a ZIP file for download. When using the Admin API, a custom file name and download proxy can be specified. Supports both Admin and Portal API types.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetIds:
                                    type: array
                                    items:
                                        type: string
                                    description: Array of asset IDs to include in the archive
                                fileName:
                                    type: string
                                    description: Custom file name for the ZIP archive (Admin API only)
                                downloadProxy:
                                    type: string
                                    description: Download proxy URL (Admin API only)
                            required:
                                - assetIds
                                - fileName
                                - downloadProxy
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /duplicateAsset:
        post:
            summary: Create a duplicate copy of the specified asset
            operationId: duplicateAsset
            description: Creates an exact copy of the asset, including its metadata and storage objects. The duplicate is placed in the same parent folder as the original.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset to duplicate
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /getAnnotations:
        get:
            summary: Retrieve all annotations for an asset
            operationId: getAnnotations
            description: Gets the complete list of annotations that have been created on the specified asset, including their timecodes, titles, summaries, and descriptions.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /getAsset:
        get:
            summary: Retrieve an asset by its unique identifier
            operationId: getAsset
            description: Gets a high-level summary of the asset details for the specified asset ID, including its display name, storage information, status, and type.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset to retrieve
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /getAssetAdBreaks:
        get:
            summary: Retrieve all ad breaks configured for an asset
            operationId: getAssetAdBreaks
            description: Gets the list of ad break cue points that have been configured for the specified video asset, including their timecodes and metadata.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /getAssetChildNodes:
        get:
            summary: Retrieve child folder nodes for a given parent folder in the asset tree
            operationId: getAssetChildNodes
            description: Gets a paginated list of child assets and subfolders within the specified parent folder. Results can be sorted and paginated.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                folderId:
                                    type: string
                                    description: The folder ID to filter results
                                sortColumn:
                                    type: string
                                    description: The column to sort results by
                                isDesc:
                                    type: boolean
                                    description: Whether to sort in descending order
                                pageIndex:
                                    type: integer
                                    description: The page index for pagination (zero-based)
                                pageSize:
                                    type: integer
                                    description: The number of items per page
                            required:
                                - assetId
                                - folderId
                                - sortColumn
                                - isDesc
                                - pageIndex
                                - pageSize
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The parent asset was not found

    /getAssetDetails:
        get:
            summary: Retrieve the full detail model for an asset, including all media properties and related assets
            operationId: getAssetDetails
            description: Gets comprehensive information about the asset including its media properties, related assets, thumbnails, transcriptions, and processing status. Supports both Admin and Portal API types.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

    /getAssetManifestWithCookies:
        get:
            summary: 'Retrieve secure streaming cookies for an asset''s related media'
            operationId: getAssetManifestWithCookies
            description: 'Gets signed cookies required for secure streaming of the asset''s media content. The cookies authorize access to the asset''s CDN-delivered media files. Supports both Admin and Portal API types.'
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                                cookieId:
                                    type: string
                                    description: The ID of the related media to get cookies for
                            required:
                                - assetId
                                - cookieId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset or media was not found

    /getAssetMetadataSummary:
        get:
            summary: Retrieve the metadata summary (labels) for an asset or folder
            operationId: getAssetMetadataSummary
            description: Gets the aggregated metadata labels and summary information for the specified asset, including AI-generated tags, custom metadata, and content classifications.
            tags:
                - Asset
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the asset
                            required:
                                - assetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found

