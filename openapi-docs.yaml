            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The ID of the content item to add the relation to
                                relatedContentId:
                                    type: string
                                    description: The ID of the content item to relate
                                contentDefinition:
                                    type: object
                                    description: The content definition object with id and description
                            required:
                                - contentId
                                - relatedContentId
                                - contentDefinition
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: One of the content items was not found

