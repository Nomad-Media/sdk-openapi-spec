    /moveScheduleEvent:
        put:
            summary: 'Moves a schedule event to a new position within a live channel''s schedule'
            operationId: moveScheduleEvent
            description: 'Repositions an existing schedule event by placing it after the specified previous schedule event. This allows reordering of events in the live channel''s schedule without removing and re-adding them.'
