    /createMediaBuilder:
        post:
            summary: Create a new media builder composition
            operationId: createMediaBuilder
            description: Creates a media builder project with the specified name, destination folder, and optional metadata such as collections, related content, tags, and properties.
            tags:
                - Media Builder
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: The name for the new media builder composition
                                destinationFolderId:
                                    type: string
                                    description: The unique identifier of the destination folder
                                collections:
                                    type: array
                                    nullable: true
                                    items:
                                        type: object
                                    description: Optional array of collection associations
                                relatedContents:
                                    type: array
                                    nullable: true
                                    items:
                                        type: object
                                    description: Optional array of related content items
                                tags:
                                    type: array
                                    nullable: true
                                    items:
                                        type: object
                                    description: Optional array of tags to assign
                                properties:
                                    type: object
                                    nullable: true
                                    description: Optional additional properties for the composition
                            required:
                                - name
                                - destinationFolderId
            responses:
                '200':
                    description: Success
                '400':
                    description: Invalid parameters provided
                '401':
                    description: The caller is not authenticated

    /createMediaBuilderItem:
        post:
            summary: Create a new item in a media builder composition
            operationId: createMediaBuilderItem
            description: Adds a media item to the specified composition, referencing a source asset with optional time code range, annotation, and related content associations.
            tags:
                - Media Builder
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                mediaBuilderId:
                                    type: string
                                sourceAssetId:
                                    type: string
                                    description: The unique identifier of the source asset to add
                                startTimeCode:
                                    type: string
                                    nullable: true
                                    description: The start time code for the clip, or null for the beginning
                                endTimeCode:
                                    type: string
                                    nullable: true
                                    description: The end time code for the clip, or null for the end
                                sourceAnnotationId:
                                    type: string
                                    nullable: true
                                    description: The annotation ID to reference, or null for none
                                relatedContents:
                                    type: array
                                    nullable: true
                                    items:
                                        type: object
                                    description: Optional array of related content items
                            required:
                                - mediaBuilderId
                                - sourceAssetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The media builder composition or source asset was not found

    /createMediaBuilderItemsAddAnnotations:
        post:
            summary: 'Add items to a media builder composition from an asset''s annotations'
            operationId: createMediaBuilderItemsAddAnnotations
            description: Creates media builder items for all annotations on the specified source asset, automatically adding each annotation as a separate item in the composition.
            tags:
                - Media Builder
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                mediaBuilderId:
                                    type: string
                                    description: The unique identifier of the media builder composition
                                sourceAssetId:
                                    type: string
                                    description: The unique identifier of the source asset whose annotations will be added
                            required:
                                - mediaBuilderId
                                - sourceAssetId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The media builder composition or source asset was not found

    /createMediaBuilderItemsBulk:
        post:
            summary: Create multiple items in a media builder composition in bulk
            operationId: createMediaBuilderItemsBulk
            description: Adds multiple media items to the specified composition in a single request. The items array is sent directly as the request body.
            tags:
                - Media Builder
            requestBody:
                required: true
