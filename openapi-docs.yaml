    /nextEvent:
        post:
            summary: Advance to the next scheduled event on a live channel
            operationId: nextEvent
            description: Triggers the live channel to skip the current schedule event and advance to the next one in the playlist or schedule.
            tags:
                - Live Channel
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                liveChannelId:
                                    type: string
                            required:
                                - liveChannelId
            responses:
                '200':
