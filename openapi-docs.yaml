    # ── Account Updates ──
    /changeEmail:
        post:
            summary: Change the email address of the currently authenticated user
            operationId: changeEmail
            description: 'Updates the authenticated user''s email address to the new value provided. The current password is supplied from the SDK instance configuration for verification. After a successful change, the user must re-authenticate with the new email address.'
            tags:
                - Account Updates
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                    description: The new email address for the user
                            required:
                                - email
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null, CognitoEmail claim is missing, or user is disabled
                '401':
                    description: The caller is not authenticated

    /changePassword:
        post:
            summary: Change the password of the currently authenticated user
            operationId: changePassword
            description: 'Updates the authenticated user''s password. The current password is supplied from the SDK instance configuration for verification along with the new password. The existing access token remains valid until expiration.'
            tags:
                - Account Updates
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                newPassword:
                                    type: string
                                    description: The new password to set for the user
                            required:
                                - newPassword
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null, CognitoEmail claim is missing, current password is incorrect, or user is disabled
                '401':
                    description: The caller is not authenticated

    /getUser:
        get:
            summary: Get the profile of the currently authenticated user
            operationId: getUser
            description: Retrieves the profile information for the currently authenticated user based on their access token.
            tags:
                - Account Updates
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: 'The user entity was not found for the authenticated user''s ID'

    /updateUser:
        put:
            summary: Update the profile of the currently authenticated user
            operationId: updateUser
            description: 'Updates the authenticated user''s profile information including name, address, phone, and organization details. Fetches the current user profile first and merges provided values with existing data — null parameters retain their current values. Country and State are resolved from lookup tables by label name.'
            tags:
                - Account Updates
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                address:
                                    type: string
                                    nullable: true
                                    description: Street address (null to keep current value)
                                address2:
                                    type: string
                                    nullable: true
                                    description: Secondary address line (null to keep current value)
                                city:
                                    type: string
                                    nullable: true
                                    description: City name (null to keep current value)
                                country:
                                    type: string
                                    nullable: true
                                    description: Country name as it appears in the Countries lookup
                                firstName:
                                    type: string
                                    nullable: true
                                    description: 'User''s first name (null to keep current value)'
                                lastName:
                                    type: string
                                    nullable: true
                                    description: 'User''s last name (null to keep current value)'
                                organization:
                                    type: string
                                    nullable: true
                                    description: Organization name (null to keep current value)
                                phoneNumber:
                                    type: string
                                    nullable: true
                                    description: Phone number (null to keep current value)
                                phoneExt:
                                    type: string
                                    nullable: true
                                    description: Phone extension (null to keep current value)
                                postalCode:
                                    type: string
                                    nullable: true
                                    description: Postal/ZIP code (null to keep current value)
                                state:
                                    type: string
                                    nullable: true
                                    description: State name as it appears in the States lookup
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The user entity was not found


