        post:
            summary: Perform bulk metadata updates across multiple content items
            operationId: bulkUpdateMetadata
            description: 'Updates collections, tags, related content, and custom metadata for multiple content items in a single request. Merges new values with existing metadata from the first content item''s asset details.'
            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentIds:
                                    type: array
                                    items:
                                        type: string
                                    description: Array of content IDs to update
                                collectionIds:
                                    type: array
                                    items:
                                        type: string
                                    description: Collection IDs to add
                                relatedContentIds:
                                    type: array
                                    items:
                                        type: string
                                    description: Related content IDs to add
                                tagIds:
                                    type: array
                                    items:
                                        type: string
                                    description: Tag IDs to add
                                schemaName:
                                    type: string
                                    description: The schema name for the metadata update
                            required:
                                - contentIds
                                - collectionIds
                                - relatedContentIds
                                - tagIds
                                - schemaName
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /createTagOrCollection:
        post:
            summary: Create a new tag or collection
            operationId: createTagOrCollection
            description: Creates a new standalone tag or collection with the specified name. The TYPE parameter determines whether a tag or collection is created.
            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                type:
                                    type: string
                                    description: 'The type of metadata to create: "tag" or "collection"'
                                tagName:
                                    type: string
                                    description: The name for the new tag or collection
                            required:
                                - type
                                - tagName
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /deleteRelatedContent:
        post:
            summary: Remove a related content association from a content item
            operationId: deleteRelatedContent
            description: Deletes the relationship between two content items. The endpoint varies by API type (admin uses `/admin/related/delete`, portal uses `/content/related/delete`).
            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The ID of the content item to remove the relation from
                                relatedContentId:
                                    type: string
                                    description: The ID of the related content item to disassociate
                                contentDefinition:
                                    type: object
                                    description: The content definition object with id and description
                            required:
                                - contentId
                                - relatedContentId
                                - contentDefinition
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /deleteTagOrCollection:
        delete:
            summary: Delete a tag or collection
            operationId: deleteTagOrCollection
            description: Permanently removes a tag or collection by its ID. This also removes the tag/collection association from all content items.
            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                type:
                                    type: string
                                    description: 'The type of metadata to delete: "tag" or "collection"'
                                tagId:
                                    type: string
                                    description: The unique identifier of the tag or collection to delete
                            required:
                                - type
                                - tagId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The tag or collection was not found

    /getTagOrCollection:
        get:
            summary: Retrieve a tag or collection by its unique identifier
            operationId: getTagOrCollection
            description: Gets the details of a specific tag or collection including its name and associated content items.
            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                type:
                                    type: string
                                    description: 'The type of metadata to retrieve: "tag" or "collection"'
                                id:
                                    type: string
                                    description: The unique identifier of the tag or collection
                            required:
                                - type
                                - id
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The tag or collection was not found

    /removeTagOrCollection:
        post:
            summary: Remove a tag or collection from a content item
            operationId: removeTagOrCollection
            description: Disassociates a tag or collection from a specific content item without deleting the tag/collection itself. The endpoint varies by API type (admin vs portal).
            tags:
                - Content Metadata
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                type:
                                    type: string
                                    description: 'The type of metadata: "tag" or "collection"'
                                contentId:
                                    type: string
                                    description: The ID of the content item
                                contentDefinition:
                                    type: string
                                tagId:
                                    type: string
                                    description: The ID of the tag or collection to remove
                            required:
                                - type
                                - contentId
                                - contentDefinition
                                - tagId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated


    # ── Ping ──
    /ping:
        post:
            summary: Check if the user session is still valid and update the session activity timestamp
            operationId: ping
            description: 'Validates that the specified session is still active and keeps it alive by updating its last activity timestamp. If single-session enforcement is enabled, detects whether the session has been replaced by a newer login. Also checks whether the user''s account has expired.'
            tags:
                - Ping
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                includeHeaders:
                                    type: string
                            required:
                                - includeHeaders
            responses:
                '200':
                    description: Success
                '400':
                    description: The request body is null or UserSessionId is missing
                '401':
                    description: The caller is not authenticated

    /pingAuth:
        post:
            summary: Send an authenticated ping to the server
            operationId: pingAuth
            description: Sends an authenticated heartbeat/ping request with user session information, optionally scoped to a specific application.
            tags:
                - Ping
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                applicationId:
                                    type: string
                                    description: The application ID to scope the ping to
                                userSessionId:
                                    type: string
                                    description: The user session ID to include in the ping
                            required:
                                - applicationId
                                - userSessionId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated


    # ── Search ──
    /search:
        post:
            summary: Search for content across the platform
            operationId: search
            description: Performs a full-text search against the content index with support for filtering, sorting, pagination, vector similarity search, and LLM-powered search. The API endpoint adapts based on the SDK configuration (admin or portal). Null parameters are automatically stripped from the request body.
            tags:
                - Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                query:
                                    type: string
                                    description: Free-text search query string
                                offset:
                                    type: integer
                                    description: Zero-based page offset for pagination
                                size:
                                    type: integer
                                    description: Number of results per page
                                filters:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/SearchFilter'
                                    description: Array of filter objects with fieldName, operator, and values
                                sortFields:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/SortField'
                                    description: Array of sort field objects with fieldName and sortType
                                searchResultFields:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/SearchResultField'
                                    description: Fields to include in results
                                similarAssetId:
                                    type: string
                                    description: Asset ID for vector similarity search
                                minScore:
                                    type: integer
                                    description: Minimum relevance score threshold
                                excludeTotalRecordCount:
                                    type: boolean
                                    description: Skip total count for faster queries
                                filterBinder:
                                    type: string
                                    description: 'Logical operator for combining filters ("0" = AND, "1" = OR)'
                                fullUrlFieldNames:
                                    type: array
                                    items:
                                        type: string
                                    description: Fields to return as full URLs
                                distinctOnFieldName:
                                    type: string
                                    description: Field name for distinct/deduplicated results
                                includeVideoClips:
                                    type: boolean
                                    description: Whether to include video clip results
                                useLlmSearch:
                                    type: boolean
                                    description: Whether to use LLM-powered search
                                includeInternalFieldsInResults:
                                    type: boolean
                                    description: Whether to include internal system fields
                                searchTextFields:
                                    type: array
                                    items:
                                        type: string
                                    description: 'Specific text fields to search within (e.g. "AssetDetails", "Transcripts", "ExifMetadata")'
                            required:
                                - query
                                - offset
                                - size
                                - filters
                                - sortFields
                                - searchResultFields
                                - similarAssetId
                                - minScore
                                - excludeTotalRecordCount
                                - filterBinder
                                - fullUrlFieldNames
                                - distinctOnFieldName
                                - includeVideoClips
                                - useLlmSearch
                                - includeInternalFieldsInResults
                                - searchTextFields
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated


    # ── Asset Upload ──
    /uploadAsset:
        post:
            summary: Start a new asset upload session
            operationId: uploadAsset
            description: Initiates a multipart upload by registering the file metadata with the server. Returns pre-signed URLs for each upload part. The file is split into 8 MB chunks (8388608 bytes) for multipart upload.
            tags:
                - Asset Upload
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    nullable: true
                                    description: The name of the asset.
                                existingAssetId:
                                    type: string
                                    nullable: true
                                    description: The Existing AssetId (file) that should be overwritten with this upload. Note that by specifying this attribute then the parentId, relativePath and displayName are all ignored.
                                relatedContentId:
                                    type: string
                                    nullable: true
                                    description: The Content ID of the related content record to associate this asset to. Note that by specifying this attribute then the parentId and relativePath attributes are both ignored.
                                uploadOverwriteOption:
                                    type: string
                                    description: The overwrite option for the upload. The option you want to use when uploading the asset. The options are continue, replace, and cancel. Continue continues the upload from where it left off. Replace replaces an existing asset. Replace is the one you want to use if you are starting a new upload. Cancel cancels an uploading asset.
                                file:
                                    type: string
                                    format: binary
                                    description: The FILE object or full or relative path of the file to upload. This is ignored if the ExistingAssetId or if the RelatedContentId has a value.
                                parentId:
                                    type: string
                                    nullable: true
                                    description: The Parent AssetId (folder) to add the upload to. Note that if there is a full relativePath, then it is appended to this parent path. If this value is omitted then the file will be added to the predefined incoming folder. This is ignored if the ExistingAssetId or if the RelatedContentId has a value.
                                languageId:
                                    type: string
                                    nullable: true
                                    description: The language of the asset to upload. If this is left blank then the default system language is used.
                                uploadReplaceOptions:
                                    type: array
                                    nullable: true
                                    items:
                                        type: string
                                    description: Gets or sets if the asset already exists on the server, this decides how to handle the situation with related assets.
                            required:
                                - uploadOverwriteOption
                                - file
            responses:
                '200':
                    description: Success
                '400':
                    description: Invalid parameters provided
                '401':
                    description: The caller is not authenticated

    /uploadRelatedAsset:
        post:
            summary: Start an upload session for a related asset
            operationId: uploadRelatedAsset
            description: Initiates a multipart upload for a file that will be associated as a related asset (e.g., subtitle track, alternate language version) to an existing asset. Uses 8 MB chunk size (8388608 bytes) for multipart upload.
            tags:
                - Asset Upload
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                existingAssetId:
                                    type: string
                                    description: Gets or sets the Existing AssetId (file) that should be overwritten with this upload. Note that by specifying this attribute then the parentId, relativePath and displayName are all ignored.
                                relatedAssetId:
                                    type: string
                                    nullable: true
                                    description: 'Gets or sets the related asset ID of the existingAsset that we''re replacing. If this is used, most of the other properties are not needed.'
                                newRelatedAssetMetadataType:
                                    type: string
                                    nullable: true
                                    description: Gets or sets the type of the related asset metadata to be created for a given ExistingAssetId. If specified, ExistingAssetId has to have a value defined.
                                uploadOverwriteOption:
                                    type: string
                                    description: The overwrite option for the upload. The option you want to use when uploading the asset. The options are continue, replace, and cancel. Continue continues the upload from where it left off. Replace replaces an existing asset. Replace is the one you want to use if you are starting a new upload.
                                file:
                                    type: string
                                    format: binary
                                    description: The FILE object or full or relative path of the file to upload. This is ignored if the ExistingAssetId or if the RelatedContentId has a value
                                languageId:
                                    type: string
                                    nullable: true
                                    description: The language of the asset to upload. If this is left blank then the default system language is used.
                            required:
                                - existingAssetId
                                - uploadOverwriteOption
                                - file
            responses:
                '200':
                    description: Success
                '400':
                    description: Invalid parameters provided
                '401':
                    description: The caller is not authenticated


    # ── Audit ──
    /getAudit:
        get:
            summary: Retrieve the audit trail for a content item
            operationId: getAudit
            description: Gets the full audit history for the specified content, including all actions performed on it (create, update, delete, access, etc.) with timestamps and user information.
            tags:
                - Audit
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The unique identifier of the content item to audit
                            required:
                                - contentId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The content item was not found


    # ── Config ──
    /clearServerCache:
        post:
            summary: Clear the server-side cache
            operationId: clearServerCache
            description: Invalidates all cached data on the Nomad CMS server, forcing fresh retrieval of configuration, content, and metadata on subsequent requests.
            tags:
                - Config
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /getConfig:
        get:
            summary: Retrieve the server configuration
            operationId: getConfig
            description: Gets the current server configuration settings. Optionally filters by a specific configuration type.
            tags:
                - Config
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                configType:
                                    type: string
                                    description: Optional configuration type to filter by
                            required:
                                - configType
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /getServerTime:
        get:
            summary: Get the current server time
            operationId: getServerTime
            description: Returns the current date and time from the Nomad CMS server. Useful for synchronizing client-side timestamps with the server clock.
            tags:
                - Config
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated


    # ── Content ──
    /createContent:
        get:
            summary: Create a new empty content model template for a given content definition
            operationId: createContent
            description: Generates a blank content record template with the specified content definition and language, ready for the user to populate with data.
            tags:
                - Content
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                                languageId:
                                    type: string
                                    description: The language ID for the content template
                                properties:
                                    type: string
                            required:
                                - contentDefinitionId
                                - languageId
                                - properties
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The content definition was not found

    /deactivateContentUserTrack:
        post:
            summary: Update the deactivation status of a content user tracking session
            operationId: deactivateContentUserTrack
            description: Sets the active/inactive status of a specific user tracking session for a content record. Used to manage content viewing activity tracking.
            tags:
                - Content
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                sessionId:
                                    type: string
                                    description: The unique identifier of the tracking session
                                contentId:
                                    type: string
                                    description: The unique identifier of the content record
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                                deactivate:
                                    type: boolean
                                    description: Whether to deactivate the tracking session
                            required:
                                - sessionId
                                - contentId
                                - contentDefinitionId
                                - deactivate
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The tracking session was not found

    /deleteContent:
        delete:
            summary: Delete a content record from the specified content definition
            operationId: deleteContent
            description: Permanently removes the content record identified by the content ID and content definition ID.
            tags:
                - Content
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The unique identifier of the content record to delete
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                            required:
                                - contentId
                                - contentDefinitionId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The content record was not found

    /getContent:
        get:
            summary: Retrieve a single content record by its ID within a given content definition
            operationId: getContent
            description: Gets the full content record including all properties, metadata, and revision information for the specified content item.
            tags:
                - Content
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The unique identifier of the content record
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                                isRevision:
                                    type: boolean
                                    description: Whether to retrieve a revision version
                            required:
                                - contentId
                                - contentDefinitionId
                                - isRevision
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The content record was not found

    /getContentUserTrack:
        get:
            summary: Retrieve a paginated list of user tracking sessions for a specific content record
            operationId: getContentUserTrack
            description: Gets all user tracking sessions associated with the specified content item, with support for sorting and pagination.
            tags:
                - Content
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The unique identifier of the content record
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                                sortColumn:
                                    type: string
                                    description: The column to sort results by
                                isDesc:
                                    type: boolean
                                    description: Whether to sort in descending order
                                pageIndex:
                                    type: integer
                                    description: The page index for pagination (zero-based)
                                pageSize:
                                    type: string
                            required:
                                - contentId
                                - contentDefinitionId
                                - sortColumn
                                - isDesc
                                - pageIndex
                                - pageSize
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /getContentUserTrackTouch:
        get:
            summary: Record or update a user session touch event for tracking content viewing activity
            operationId: getContentUserTrackTouch
            description: 'Creates or updates a touch event that records the user''s interaction with the specified content item, used for tracking viewing activity and engagement.'
            tags:
                - Content
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The unique identifier of the content record
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                            required:
                                - contentId
                                - contentDefinitionId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /updateContent:
        put:
            summary: Update an existing content record within a content definition
            operationId: updateContent
            description: Retrieves the current content record, merges the provided properties with the existing properties (performing deep comparison), and saves the result. Only changed properties are updated while preserving unchanged values.
            tags:
                - Content
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The unique identifier of the content record to update
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                                properties:
                                    type: object
                                    description: The properties to update on the content record
                                languageId:
                                    type: string
                                    description: The language ID for the content
                            required:
                                - contentId
                                - contentDefinitionId
                                - properties
                                - languageId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The content record was not found


    # ── Content Definition ──
    /createContentDefinition:
        get:
            summary: Create a new content definition
            operationId: createContentDefinition
            description: Initializes a new, empty content definition with default settings. The returned object can then be configured with fields, groups, and properties before being saved via updateContentDefinition.
            tags:
                - Content Definition
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /getContentDefinition:
        get:
            summary: Retrieve a content definition by its unique identifier
            operationId: getContentDefinition
            description: Gets the full content definition including all configured fields, properties, security settings, and metadata.
            tags:
                - Content Definition
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentDefinitionId:
                                    type: string
                            required:
                                - contentDefinitionId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The content definition was not found

    /getContentDefinitions:
        get:
            summary: Retrieve a paginated list of content definitions
            operationId: getContentDefinitions
            description: Gets all content definitions with optional filtering by management type, sorting, and pagination support.
            tags:
                - Content Definition
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentManagementType:
                                    type: string
                                    description: Filter by content management type
                                sortColumn:
                                    type: string
                                    description: The column name to sort results by
                                isDesc:
                                    type: boolean
                                    description: Whether to sort in descending order
                                pageIndex:
                                    type: integer
                                    description: The zero-based page index for pagination
                                pageSize:
                                    type: integer
                                    description: The number of results per page
                            required:
                                - contentManagementType
                                - sortColumn
                                - isDesc
                                - pageIndex
                                - pageSize
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /updateContentDefinition:
        put:
            summary: Update an existing content definition
            operationId: updateContentDefinition
            description: 'Updates a content definition''s fields, properties, and settings. This method performs a read-modify-write operation: it fetches the current definition to resolve display field and route item name references, then merges the provided values with existing data before saving. Pass `null` for any parameter to preserve its current value.'
            tags:
                - Content Definition
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentDefinitionId:
                                    type: string
                                name:
                                    type: string
                                    description: The display name for the content definition (null to keep existing)
                                contentFields:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/ContentField'
                                    description: Array of content field definitions (null to keep existing)
                                contentDefinitionGroup:
                                    type: string
                                    description: The group name to assign (null to keep existing)
                                contentDefinitionType:
                                    type: string
                                    description: The type description to assign (null to keep existing)
                                displayField:
                                    type: string
                                    description: The title of the field to use as the display field (null to keep existing)
                                routeItemNameField:
                                    type: string
                                    description: The title of the field to use for route item names (null to keep existing)
                                securityGroups:
                                    type: array
                                    items:
                                        type: string
                                    description: Array of security group names to assign (null to keep existing)
                                systemRoles:
                                    type: array
                                    items:
                                        type: string
                                    description: Array of system role names to assign (null to keep existing)
                                includeInTags:
                                    type: boolean
                                    description: Whether to include this definition in tags (null to keep existing)
                                indexContent:
                                    type: boolean
                                    description: Whether to index content of this type (null to keep existing)
                            required:
                                - contentDefinitionId
                                - name
                                - contentFields
                                - contentDefinitionGroup
                                - contentDefinitionType
                                - displayField
                                - routeItemNameField
                                - securityGroups
                                - systemRoles
                                - includeInTags
                                - indexContent
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The content definition was not found


    # ── Event ──
    /createAndUpdateEvent:
        get:
            summary: Create or update an event
            operationId: createAndUpdateEvent
            description: Creates a new event or updates an existing one. If no CONTENT_ID is provided, a new content item is created first using the specified content definition. The event properties include scheduling, type, and optional series configuration.
            tags:
                - Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The content ID of an existing event to update (null to create new)
                                contentDefinitionId:
                                    type: string
                                    description: The content definition ID for the event type
                                name:
                                    type: string
                                    description: The display name of the event
                                startDatetime:
                                    type: string
                                    description: The event start date/time in ISO 8601 format
                                endDatetime:
                                    type: string
                                    description: The event end date/time in ISO 8601 format
                                eventType:
                                    type: object
                                    description: The event type object with id and description
                                series:
                                    type: object
                                    description: The series configuration if this is a recurring event
                                isDisabled:
                                    type: string
                                overrideSeriesProperties:
                                    type: boolean
                                    description: Whether to override inherited series properties
                                seriesProperties:
                                    type: object
                                    description: Additional series-specific properties
                            required:
                                - contentId
                                - contentDefinitionId
                                - name
                                - startDatetime
                                - endDatetime
                                - eventType
                                - series
                                - isDisabled
                                - overrideSeriesProperties
                                - seriesProperties
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /deleteEvent:
        delete:
            summary: Delete an event
            operationId: deleteEvent
            description: Permanently removes an event and its associated content by ID and content definition.
            tags:
                - Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                contentDefinitionId:
                                    type: string
                                    description: The content definition ID of the event
                            required:
                                - contentId
                                - contentDefinitionId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The event was not found

    /addLiveScheduleToEvent:
        post:
            summary: Add a live schedule configuration to an event
            operationId: addLiveScheduleToEvent
            description: Creates a live schedule associated with the specified event, configuring the live channel, inputs, output profiles, and video overlays (slate, preroll, postroll).
            tags:
                - Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                eventId:
                                    type: string
                                    description: The content ID of the event to add the live schedule to
                                slateVideo:
                                    type: object
                                    description: The slate video asset to display during breaks
                                prerollVideo:
                                    type: object
                                    description: The preroll video asset to play before the event
                                postrollVideo:
                                    type: object
                                    description: The postroll video asset to play after the event
                                isSecureOutput:
                                    type: boolean
                                    description: Whether the output stream is secure
                                archiveFolder:
                                    type: string
                                primaryLiveInput:
                                    type: object
                                    description: The primary live input configuration
                                backupLiveInput:
                                    type: object
                                    description: The backup live input configuration
                                primaryLivestreamInputUrl:
                                    type: string
                                    description: The primary livestream input URL
                                backupLivestreamInputUrl:
                                    type: string
                                    description: The backup livestream input URL
                                externalOutputProfiles:
                                    type: string
                                    format: binary
                                    description: External output profiles
                                status:
                                    type: object
                                    description: The initial status for the live schedule
                                statusMessage:
                                    type: string
                                    description: The initial status message
                                liveChannel:
                                    type: object
                                    description: The live channel to associate with
                                overrideSettings:
                                    type: object
                                    description: Override settings for the schedule
                                outputProfileGroup:
                                    $ref: '#/components/schemas/CollectionRef'
                            required:
                                - eventId
                                - slateVideo
                                - prerollVideo
                                - postrollVideo
                                - isSecureOutput
                                - archiveFolder
                                - primaryLiveInput
                                - backupLiveInput
                                - primaryLivestreamInputUrl
                                - backupLivestreamInputUrl
                                - externalOutputProfiles
                                - status
                                - statusMessage
                                - liveChannel
                                - overrideSettings
                                - outputProfileGroup
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /extendLiveSchedule:
        post:
            summary: Extend a live schedule with recurring copies
            operationId: extendLiveSchedule
            description: Creates recurring copies of the live schedule associated with the specified event, based on the recurring day/week pattern and end date.
            tags:
                - Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                eventId:
                                    type: string
                                    description: The content ID of the event whose schedule to extend
                                recurringDays:
                                    type: integer
                                    description: Array of day numbers for recurrence
                                recurringWeeks:
                                    type: integer
                                    description: Number of weeks for the recurrence pattern
                                endDate:
                                    type: string
                                    description: The end date for the recurrence (ISO format)
                            required:
                                - eventId
                                - recurringDays
                                - recurringWeeks
                                - endDate
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /getLiveSchedule:
        get:
            summary: Retrieve the live schedule for an event
            operationId: getLiveSchedule
            description: Gets the live schedule configuration associated with the specified event, including channel, input, and output settings.
            tags:
                - Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                eventId:
                                    type: string
                                    description: The content ID of the event
                            required:
                                - eventId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The event or live schedule was not found

    /startLiveSchedule:
        post:
            summary: Start the live schedule for an event
            operationId: startLiveSchedule
            description: Activates the live schedule associated with the specified event, starting the live channel and beginning the broadcast.
            tags:
                - Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                eventId:
                                    type: string
                                    description: The content ID of the event whose schedule to start
                            required:
                                - eventId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The event or live schedule was not found

    /stopLiveSchedule:
        post:
            summary: Stop the live schedule for an event
            operationId: stopLiveSchedule
            description: Deactivates the live schedule associated with the specified event, stopping the broadcast and associated live channel.
            tags:
                - Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                eventId:
                                    type: string
                                    description: The content ID of the event whose schedule to stop
                            required:
                                - eventId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The event or live schedule was not found


    # ── Job ──
    /createJob:
        post:
            summary: Create a new processing job
            operationId: createJob
            description: Creates a job to process media from an S3 bucket or URL. The job can include specific tasks (e.g., transcoding, thumbnail generation) and transcode profiles. Supports callback notifications when the job completes.
            tags:
                - Job
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                bucketName:
                                    type: string
                                objectKey:
                                    type: string
                                notificationCallbackUrl:
                                    type: string
                                externalId:
                                    type: string
                                replaceExistingJob:
                                    type: string
                                assetUrl:
                                    type: string
                                requestedTasks:
                                    type: string
                                requestedTranscodeProfiles:
                                    type: string
                            required:
                                - bucketName
                                - objectKey
                                - notificationCallbackUrl
                                - externalId
                                - replaceExistingJob
                                - assetUrl
                                - requestedTasks
                                - requestedTranscodeProfiles
            responses:
                '200':
                    description: Success
                '400':
                    description: Invalid parameters provided
                '401':
                    description: The caller is not authenticated

    /createJobId:
        post:
            summary: Create a processing job for an asset
            operationId: createJobId
            description: Creates a new job record associated with the specified asset for external processing workflows. The job can include a callback URL and external identifier.
            tags:
                - Job
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                jobResultsUrl:
                                    type: string
                                externalId:
                                    type: string
                            required:
                                - assetId
                                - jobResultsUrl
                                - externalId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The asset was not found


    # ── Live Channel ──
    /clipLiveChannel:
        post:
            summary: 'Create a clip from a live channel''s output'
            operationId: clipLiveChannel
            description: 'Extracts a segment from the live channel''s recorded output between the specified time codes and saves it as a new asset in the designated output folder.'
            tags:
                - Live Channel
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                liveChannelId:
                                    type: string
                                startTimeCode:
                                    type: string
                                    description: The start time code for the clip
                                endTimeCode:
                                    type: string
                                    description: The end time code for the clip
                                title:
                                    type: string
                                    description: The title for the clipped asset
                                outputFolderId:
                                    type: string
                                    description: The output folder ID where the clip will be saved
                                tags:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/TagRef'
                                    description: Tags to assign to the clipped asset
                                collections:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/CollectionRef'
                                    description: Collections to assign to the clipped asset
                                relatedContents:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/RelatedContentRef'
                                    description: Related content to associate with the clip
                                videoBitrate:
                                    type: integer
                                    description: The video bitrate for the clip
                                audioTracks:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/AudioTrack'
                                    description: Audio track configurations for the clip
                            required:
                                - liveChannelId
                                - startTimeCode
                                - endTimeCode
                                - title
                                - outputFolderId
                                - tags
                                - collections
                                - relatedContents
                                - videoBitrate
                                - audioTracks
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The live channel was not found

    /createLiveChannel:
        post:
            summary: Create a new live channel
            operationId: createLiveChannel
            description: Provisions a new live channel with the specified configuration including type, security settings, and output options. Automatically generates a route name from the channel name and resolves security group names to IDs.
            tags:
                - Live Channel
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: The display name for the live channel
                                thumbnailImageId:
                                    type: string
                                    description: The asset ID of the thumbnail image
                                archiveFolderAssetId:
                                    type: string
                                    description: The asset ID of the archive folder
                                enableHighAvailability:
                                    type: boolean
                                    description: Whether to enable high availability
                                enableLiveClipping:
                                    type: boolean
                                    description: Whether to enable live clipping
                                isSecureOutput:
                                    type: boolean
                                    description: Whether the output stream is secure
                                isOutputScreenshots:
                                    type: boolean
                                    description: Whether to capture output screenshots
                                type:
                                    type: string
                                    description: 'The channel type: "External", "IVS", "Normal", or "Realtime"'
                                externalServiceApiUrl:
                                    type: string
                                externalOutputProfiles:
                                    type: string
                                    format: binary
                                    description: External output profile configurations
                                securityGroups:
                                    type: array
                                    items:
                                        type: string
                                    description: 'Security group names (e.g., "Content Manager", "Everyone", "Guest")'
                            required:
                                - name
                                - thumbnailImageId
                                - archiveFolderAssetId
                                - enableHighAvailability
                                - enableLiveClipping
                                - isSecureOutput
                                - isOutputScreenshots
                                - type
                                - externalServiceApiUrl
                                - externalOutputProfiles
                                - securityGroups
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /deleteLiveChannel:
        delete:
            summary: Delete a live channel and optionally its associated live inputs
            operationId: deleteLiveChannel
            description: Removes the specified live channel from the system. When DELETE_INPUTS is true, first retrieves all associated live input IDs and deletes each one before deleting the channel itself.
            tags:
                - Live Channel
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                liveChannelId:
                                    type: string
                                deleteLiveInputs:
                                    type: string
                            required:
                                - liveChannelId
                                - deleteLiveInputs
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The live channel was not found

    /getLiveChannel:
        get:
            summary: Retrieve a live channel by its unique identifier
            operationId: getLiveChannel
            description: Gets the full live channel details including configuration, status, schedule events, output profiles, and security groups.
            tags:
                - Live Channel
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                liveChannelId:
                                    type: string
                            required:
                                - liveChannelId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The live channel was not found

    /getLiveChannels:
        get:
            summary: Retrieve all live channels
            operationId: getLiveChannels
            description: Gets a list of all live channels in the system with their full configuration, status, and schedule information.
            tags:
                - Live Channel
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

