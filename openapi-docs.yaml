    # ── Schedule Event ──
    /addAssetScheduleEvent:
        post:
            summary: Adds an asset schedule event to a live channel
            operationId: addAssetScheduleEvent
            description: 'Creates a new video asset schedule event in the specified live channel''s schedule. The event can be configured to loop and placed after a specific existing event using the previous ID parameter.'
            tags:
                - Schedule Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                channelId:
                                    type: string
                                    description: The unique identifier of the live channel
                                asset:
                                    type: object
                                    description: The asset object to schedule (must include id and description)
                                isLoop:
                                    type: boolean
                                    description: Whether the asset should loop continuously
                                durationTimeCode:
                                    type: string
                                    description: 'The duration timecode for the event (e.g., "00:30:00")'
                                previousId:
                                    type: string
                                    description: The ID of the schedule event after which this event should be placed
                            required:
                                - channelId
                                - asset
                                - isLoop
                                - durationTimeCode
                                - previousId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The specified channel was not found

    /addInputScheduleEvent:
        post:
            summary: Adds an input schedule event to a live channel
            operationId: addInputScheduleEvent
            description: 'Creates a new live input schedule event in the specified live channel''s schedule. The event references a live input source and optionally a backup input for failover. A fixed on-air time in UTC can be specified, and the event can be placed after a specific existing event using the previous ID parameter.'
            tags:
                - Schedule Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                channelId:
                                    type: string
                                    description: The unique identifier of the live channel
                                input:
                                    type: object
                                    description: The primary live input object to schedule
                                backupInput:
                                    type: object
                                    description: An optional backup live input for failover
                                fixedOnAirTimeUtc:
                                    type: string
                                    description: The fixed on-air time in UTC (ISO 8601 format)
                                previousId:
                                    type: string
                                    description: The ID of the schedule event after which this event should be placed
                            required:
                                - channelId
                                - input
                                - backupInput
                                - fixedOnAirTimeUtc
                                - previousId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The specified channel was not found

    /getAssetScheduleEvent:
        get:
            summary: Gets an asset schedule event from a live channel
            operationId: getAssetScheduleEvent
            description: 'Retrieves the details of a specific asset schedule event by its ID from the specified live channel''s schedule.'
            tags:
                - Schedule Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                channelId:
                                    type: string
                                    description: The unique identifier of the live channel
                                scheduleEventId:
                                    type: string
                                    description: The unique identifier of the schedule event to retrieve
                            required:
                                - channelId
                                - scheduleEventId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The specified channel or schedule event was not found

    /getInputScheduleEvent:
        get:
            summary: Gets an input schedule event from a live channel
            operationId: getInputScheduleEvent
            description: 'Retrieves the details of a specific input schedule event by its ID from the specified live channel''s schedule.'
