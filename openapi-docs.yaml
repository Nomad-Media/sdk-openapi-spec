    # ── Guest Registration ──
    /guestInvite:
        post:
            summary: Invite one or more users as guests with access to specific content
            operationId: guestInvite
            description: 'Sends guest invitations to the specified email addresses, granting them access to the specified content. For each email: if the user does not already exist, a new guest account is created with PendingInvitation status. An invitation email is sent to each recipient.'
            tags:
                - Guest Registration
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The ID of the content to grant access to
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                                userId:
                                    type: string
                                    description: The ID of the user sending the invitation
                                emails:
                                    type: array
                                    items:
                                        type: object
                                    description: Array of email addresses to invite
                                contentSecurityAttribute:
                                    type: string
                                    description: 'The content security attribute (e.g., "Undefined", "Guest", "Demo")'
                            required:
                                - contentId
                                - contentDefinitionId
                                - userId
                                - emails
                                - contentSecurityAttribute
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null, Emails is empty, or ContentDefinitionId is missing
                '401':
                    description: The caller is not authenticated

    /registerGuest:
        post:
            summary: Complete registration for a guest user who was invited via the invite-user endpoint
            operationId: registerGuest
            description: 'Completes the registration process for a user who received a guest invitation. The user must have a pending invitation that has not expired. Sets the user''s password, verifies their email address, and activates their account so they can log in.'
            tags:
                - Guest Registration
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                    description: The email address of the invited guest
                                firstName:
                                    type: string
                                    description: 'The guest''s first name'
                                lastName:
                                    type: string
                                    description: 'The guest''s last name'
                                password:
                                    type: string
                                    description: The password for the guest account
                            required:
                                - email
                                - firstName
                                - lastName
                                - password
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null, user not in PendingInvitation status, invitation expired, or guest profile missing

    /removeGuest:
        post:
            summary: Remove content access for a user, revoking their invitation or shared access
            operationId: removeGuest
            description: 'Revokes the specified user''s access to the given content. The user''s active sessions for this content are terminated. If the user has no remaining content access, their account may be deleted (if still pending invitation) or expired (if active).'
            tags:
                - Guest Registration
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                contentId:
                                    type: string
                                    description: The ID of the content to revoke access from
                                contentDefinitionId:
                                    type: string
                                    description: The ID of the content definition
                                userId:
                                    type: string
                                    description: The ID of the user whose access is being revoked
                                emails:
                                    type: array
                                    items:
                                        type: object
                                    description: Array of email addresses of users to remove
                                contentSecurityAttribute:
                                    type: string
                                    description: 'The content security attribute (e.g., "Undefined", "Guest", "Demo")'
                            required:
                                - contentId
                                - contentDefinitionId
                                - userId
                                - emails
                                - contentSecurityAttribute
            responses:
                '200':
                    description: Success
                '400':
                    description: The request is null or neither UserId nor Emails are provided
                '401':
                    description: The caller is not authenticated


