    /updateAssetScheduleEvent:
        put:
            summary: Updates an asset schedule event in a live channel
            operationId: updateAssetScheduleEvent
            description: 'Modifies an existing video asset schedule event in the specified live channel''s schedule. The function first fetches the current event details, then applies only the changed fields while preserving existing values for unchanged parameters.'
            tags:
                - Schedule Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier of the schedule event to update
                                channelId:
                                    type: string
                                    description: The unique identifier of the live channel
                                asset:
                                    type: object
                                    description: The updated asset object (retains existing value if unchanged)
                                isLoop:
                                    type: boolean
                                    description: Whether the asset should loop continuously (retains existing value if unchanged)
                                durationTimeCode:
                                    type: string
                                    description: The updated duration timecode (retains existing value if unchanged)
                                previousId:
                                    type: string
                            required:
                                - id
                                - channelId
                                - asset
                                - isLoop
                                - durationTimeCode
                                - previousId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The specified channel or schedule event was not found

    /updateInputScheduleEvent:
        put:
            summary: Updates an input schedule event in a live channel
            operationId: updateInputScheduleEvent
            description: 'Modifies an existing live input schedule event in the specified live channel''s schedule. The function first fetches the current event details, then applies only the changed fields while preserving existing values for unchanged parameters. Both the primary and backup live inputs are handled with their id and name mappings.'
            tags:
                - Schedule Event
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier of the schedule event to update
                                channelId:
                                    type: string
                                    description: The unique identifier of the live channel
                                input:
                                    type: object
                                    description: The updated primary live input object with id and name (retains existing value if unchanged)
                                backupInput:
                                    type: object
                                    description: The updated backup live input object with id and name (retains existing value if unchanged)
                                fixedOnAirTimeUtc:
                                    type: string
                                    description: The updated fixed on-air time in UTC (retains existing value if unchanged)
                            required:
                                - id
                                - channelId
                                - input
                                - backupInput
                                - fixedOnAirTimeUtc
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The specified channel or schedule event was not found


