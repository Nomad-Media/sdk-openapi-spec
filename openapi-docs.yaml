    # ── Saved Search ──
    /addSavedSearch:
        post:
            summary: Add a new saved search
            operationId: addSavedSearch
            description: Creates a saved search with the specified name, visibility settings, and search criteria. The search criteria (query, filters, sort fields, etc.) are stored so the search can be re-executed later. Supports pagination, scoring, and custom result field selection.
            tags:
                - Saved Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                    description: The name of the saved search
                                featured:
                                    type: boolean
                                    description: Whether the saved search is featured
                                bookmarked:
                                    type: boolean
                                    description: Whether the saved search is bookmarked
                                sequence:
                                    type: integer
                                    description: The display order sequence number
                                query:
                                    type: string
                                    description: The search query string (maps to searchTerms)
                                offset:
                                    type: integer
                                    description: The page offset for pagination (defaults to 0)
                                size:
                                    type: integer
                                    description: The page size for results (defaults to 10)
                                filters:
                                    type: object
                                    description: Filter object to apply to the search (maps to advanceSearchFilters)
                                sortFields:
                                    type: string
                                    description: Sort field string for ordering results (maps to sortField)
                                searchResultFields:
                                    type: array
                                    items:
                                        type: string
                                    description: Array of field names to include in results
                                similarAssetId:
                                    type: string
                                    description: The ID of an asset to find similar results for
                                minScore:
                                    type: integer
                                    description: The minimum relevance score threshold for results
                                excludeTotalRecordCount:
                                    type: boolean
                                    description: Whether to exclude the total record count from results
                                filterBinder:
                                    type: string
                                    description: 'The logical binder for combining filters (e.g., "AND", "OR")'
                            required:
                                - name
                                - featured
                                - bookmarked
                                - sequence
                                - query
                                - offset
                                - size
                                - filters
                                - sortFields
                                - searchResultFields
                                - similarAssetId
                                - minScore
                                - excludeTotalRecordCount
                                - filterBinder
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /deleteSavedSearch:
        delete:
            summary: Delete a saved search
            operationId: deleteSavedSearch
            description: Permanently removes a saved search identified by its ID.
            tags:
                - Saved Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier of the saved search to delete
                            required:
                                - id
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The saved search was not found

    /getSavedSearch:
        get:
            summary: Get a saved search by ID
            operationId: getSavedSearch
            description: Retrieves the details of a specific saved search, including its name, visibility settings, and search criteria.
            tags:
                - Saved Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier of the saved search
                            required:
                                - id
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The saved search was not found

    /getSavedSearches:
        get:
            summary: Get all saved searches
            operationId: getSavedSearches
            description: Retrieves the list of all saved searches available to the authenticated user.
            tags:
                - Saved Search
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /getSearchSaved:
        post:
            summary: Search saved searches with custom criteria
            operationId: getSearchSaved
            description: Performs a search across saved searches using the provided query, filters, and pagination parameters. Supports similarity search, scoring thresholds, and custom result field selection.
            tags:
                - Saved Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                query:
                                    type: string
                                    description: The search query string
                                offset:
                                    type: integer
                                    description: The page offset for pagination
                                size:
                                    type: integer
                                    description: The page size for results
                                filters:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/SearchFilter'
                                    description: Array of filter objects to apply to the search
                                sortFields:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/SortField'
                                    description: Array of sort field objects for ordering results
                                searchResultFields:
                                    type: array
                                    items:
                                        type: string
                                    description: Array of field names to include in results
                                similarAssetId:
                                    type: string
                                    description: The ID of an asset to find similar results for
                                minScore:
                                    type: integer
                                    description: The minimum relevance score threshold for results
                                excludeTotalRecordCount:
                                    type: boolean
                                    description: Whether to exclude the total record count from results
                                filterBinder:
                                    type: string
                                    description: 'The logical binder for combining filters (e.g., "AND", "OR")'
                            required:
                                - query
                                - offset
                                - size
                                - filters
                                - sortFields
                                - searchResultFields
                                - similarAssetId
                                - minScore
                                - excludeTotalRecordCount
                                - filterBinder
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /getSearchSavedById:
        get:
            summary: Execute a saved search by ID
            operationId: getSearchSavedById
            description: Retrieves and executes a previously saved search by its ID, returning the search results using the stored search criteria.
            tags:
                - Saved Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier of the saved search to execute
                            required:
                                - id
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The saved search was not found

    /patchSavedSearch:
        patch:
            summary: Partially update a saved search
            operationId: patchSavedSearch
            description: Performs a partial update of a saved search, allowing individual fields to be modified without affecting other properties. Only the provided fields are updated; omitted fields remain unchanged. Boolean fields (featured, bookmarked, public) support explicit `false` values.
            tags:
                - Saved Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier of the saved search to update
                                name:
                                    type: string
                                    description: The new name for the saved search
                                featured:
                                    type: boolean
                                    description: Whether the saved search is featured
                                bookmarked:
                                    type: boolean
                                    description: Whether the saved search is bookmarked
                                public:
                                    type: boolean
                                    description: Whether the saved search is publicly visible
                                sequence:
                                    type: integer
                                    description: The display order sequence number
                            required:
                                - id
                                - name
                                - featured
                                - bookmarked
                                - public
                                - sequence
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The saved search was not found

    /updateSavedSearch:
        put:
            summary: Update an existing saved search
            operationId: updateSavedSearch
            description: Performs a full update of a saved search identified by ID. First retrieves the current saved search data, then merges provided values with existing values (falling back to current values for any parameters not supplied). This ensures all fields are populated in the update request.
            tags:
                - Saved Search
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier of the saved search to update
                                name:
                                    type: string
                                    description: The name of the saved search
                                featured:
                                    type: boolean
                                    description: Whether the saved search is featured
                                bookmarked:
                                    type: boolean
                                    description: Whether the saved search is bookmarked
                                public:
                                    type: boolean
                                    description: Whether the saved search is publicly visible
                                type:
                                    type: string
                                    description: The type of the saved search
                                sequence:
                                    type: string
                                query:
                                    type: string
                                    description: The search query string
                                offset:
                                    type: integer
                                    description: The page offset for pagination
                                size:
                                    type: integer
                                    description: The page size for results
                                filters:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/SearchFilter'
                                    description: Array of filter objects to apply to the search
                                sortFields:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/SortField'
                                    description: Array of sort field objects for ordering results
                                searchResultFields:
                                    type: array
                                    items:
                                        type: string
                                    description: Array of field names to include in results
                                similarAssetId:
                                    type: string
                                    description: The ID of an asset to find similar results for
                                minScore:
                                    type: integer
                                    description: The minimum relevance score threshold for results
                                excludeTotalRecordCount:
                                    type: boolean
                                    description: Whether to exclude the total record count from results
                                filterBinder:
                                    type: string
                                    description: 'The logical binder for combining filters (e.g., "AND", "OR")'
                            required:
                                - id
                                - name
                                - featured
                                - bookmarked
                                - public
                                - type
                                - sequence
                                - query
                                - offset
                                - size
                                - filters
                                - sortFields
                                - searchResultFields
                                - similarAssetId
                                - minScore
                                - excludeTotalRecordCount
                                - filterBinder
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The saved search was not found


    # ── Share ──
    /deleteShare:
        delete:
            summary: Delete a share
            operationId: deleteShare
            description: Permanently removes a share identified by its share ID, revoking all associated access permissions.
            tags:
                - Share
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                shareId:
                                    type: string
                                    description: The unique identifier of the share to delete
                            required:
                                - shareId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The share was not found

    /getShare:
        get:
            summary: Get a share by ID
            operationId: getShare
            description: Retrieves the details of a specific share, including its contents, permissions, sharing configuration, and expiration settings.
            tags:
                - Share
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                shareId:
                                    type: string
                                    description: The unique identifier of the share to retrieve
                            required:
                                - shareId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The share was not found

    /share:
        post:
            summary: Create a new share
            operationId: share
            description: Creates a share with the specified content, permissions, and sharing settings. Shares allow content to be distributed to other users with configurable access duration, permissions, and expiration.
            tags:
                - Share
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                    description: The unique identifier for the share
                                name:
                                    type: string
                                    description: The display name of the share
                                sharedContents:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/ContentRef'
                                    description: Array of content objects included in the share
                                sharedDuration:
                                    type: object
                                    description: The duration configuration for the share
                                sharedPermissions:
                                    type: object
                                    description: The permission settings for shared users
                                sharedType:
                                    type: object
                                    description: The type of share (e.g., link-based, user-based)
                                sharedStatus:
                                    type: object
                                    description: The current status of the share
                                sharedDurationInHours:
                                    type: integer
                                    description: The share duration expressed in hours
                                sharedLink:
                                    type: string
                                    description: The shareable link URL
                                ownerId:
                                    type: string
                                    description: The ID of the user who owns the share
                                expirationDate:
                                    type: string
                                    description: The expiration date/time of the share
                                assetId:
                                    type: string
                                    description: The ID of the asset being shared
                                sharedUsers:
                                    type: string
                            required:
                                - id
                                - name
                                - sharedContents
                                - sharedDuration
                                - sharedPermissions
                                - sharedType
                                - sharedStatus
                                - sharedDurationInHours
                                - sharedLink
                                - ownerId
                                - expirationDate
                                - assetId
                                - sharedUsers
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated

    /shareExpire:
        post:
            summary: Expire a share
            operationId: shareExpire
            description: Immediately expires a share, revoking access for all shared users regardless of the original expiration date. This effectively disables the share without deleting it.
            tags:
                - Share
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                shareId:
                                    type: string
                                    description: The unique identifier of the share to expire
                            required:
                                - shareId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The share was not found

    /shareNotification:
        post:
            summary: Send share notifications
            operationId: shareNotification
            description: Sends notification emails to the specified Nomad users and/or external users, informing them about the shared content. This can be used to notify users after a share has been created or updated.
            tags:
                - Share
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                shareId:
                                    type: string
                                    description: The unique identifier of the share to notify about
                                nomadUsers:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/NomadUser'
                                    description: Array of Nomad user objects to notify
                                externalUsers:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/ExternalUser'
                                    description: Array of external user objects to notify
                            required:
                                - shareId
                                - nomadUsers
                                - externalUsers
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated
                '404':
                    description: The share was not found

    /updateShare:
        put:
            summary: Update an existing share
            operationId: updateShare
            description: Performs a full update of a share identified by its share ID. First retrieves the current share data, then merges provided values with existing values (falling back to current values for any parameters not supplied). Returns null if the share is not found.
            tags:
                - Share
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                shareId:
                                    type: string
                                    description: The unique identifier of the share to update (used in the URL)
                                id:
                                    type: string
                                    description: The ID value to set in the share body
                                name:
                                    type: string
                                    description: The display name of the share
                                sharedContents:
                                    type: array
                                    items:
                                        $ref: '#/components/schemas/ContentRef'
                                    description: Array of content objects included in the share
                                sharedDuration:
                                    type: object
                                    description: The duration configuration for the share
                                sharedPermissions:
                                    type: object
                                    description: The permission settings for shared users
                                sharedType:
                                    type: object
                                    description: The type of share
                                sharedStatus:
                                    type: object
                                    description: The current status of the share
                                sharedDurationInHours:
                                    type: integer
                                    description: The share duration expressed in hours
                                sharedLink:
                                    type: string
                                    description: The shareable link URL
                                ownerId:
                                    type: string
                                    description: The ID of the user who owns the share
                                expirationDate:
                                    type: string
                                    description: The expiration date/time of the share
                                assetId:
                                    type: string
                                    description: The ID of the asset being shared
                                sharedUsers:
                                    type: string
                            required:
                                - shareId
                                - id
                                - name
                                - sharedContents
                                - sharedDuration
                                - sharedPermissions
                                - sharedType
                                - sharedStatus
                                - sharedDurationInHours
                                - sharedLink
                                - ownerId
                                - expirationDate
                                - assetId
                                - sharedUsers
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated


    # ── Video Tracking ──
    /getVideoTracking:
        get:
            summary: Record or retrieve a video tracking event for an asset
            operationId: getVideoTracking
            description: Sends a tracking beacon for the specified asset, recording the playback event type and the current playback position.
            tags:
                - Video Tracking
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                assetId:
                                    type: string
                                    description: The unique identifier of the video asset being tracked
                                trackingEvent:
                                    type: string
                                    description: 'The tracking event type (e.g., "play", "pause", "complete")'
                                seconds:
                                    type: integer
                                    description: The current playback position in seconds
                                liveChannelId:
                                    type: string
                                    description: The live channel ID if tracking a live stream
                                contentId:
                                    type: string
                                    description: The content ID associated with the tracking event
                                profileId:
                                    type: string
                                    description: The profile ID associated with the tracking event
                            required:
                                - assetId
                                - trackingEvent
                                - seconds
                                - liveChannelId
                                - contentId
                                - profileId
            responses:
                '200':
                    description: Success
                '400':
                    description: Bad Request
                '401':
                    description: The caller is not authenticated


